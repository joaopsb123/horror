<!DOCTYPE html>
<html>
<head>
  <title>Horror Game Lobby</title>
</head>
<body>
<h1>Horror Game - Lobby</h1>

<input id="username" placeholder="Username">
<input id="password" placeholder="Password" type="password">
<button onclick="createAccount()">Criar Conta</button>
<button onclick="login()">Login</button>
<p id="status"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.26.0/dist/supabase.min.js"></script>
<script>
const SUPABASE_URL = window.NEXT_PUBLIC_storage2_SUPABASE_URL;
const SUPABASE_ANON_KEY = window.NEXT_PUBLIC_storage2_SUPABASE_ANON_KEY;
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let user_id = null;

async function createAccount() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  user_id = "user_" + Math.floor(Math.random()*10000);
  const password_hash = btoa(password);
  const { error } = await supabase.from("users").insert({
    id: user_id,
    username,
    password_hash
  });
  if (error) {
    document.getElementById("status").innerText = error.message;
  } else {
    document.getElementById("status").innerText = "Conta criada!";
  }
}

async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const { data, error } = await supabase.from("users").select("*").eq("username", username).single();
  if (error || !data) { document.getElementById("status").innerText = "Usuário não encontrado"; return; }
  const password_hash = btoa(password);
  if (password_hash !== data.password_hash) { document.getElementById("status").innerText = "Senha incorreta"; return; }
  user_id = data.id;
  document.getElementById("status").innerText = "Login OK!";
}

// Tornar globais
window.createAccount = createAccount;
window.login = login;
</script>
</body>
</html>
