<!DOCTYPE html>
<html>
<head>
  <title>Top-Down Game Supabase</title>
</head>
<body>
<h1>Top-Down Game + Supabase</h1>
<canvas id="game" width="800" height="600" style="border:1px solid black;"></canvas>

<script type="module">
// Import supabase-js (ES module)
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js";

// === CONFIGURAÇÃO SUPABASE ===
const SUPABASE_URL = import.meta.env.VITE_SUPABASE_URL || window.NEXT_PUBLIC_SUPABASE_URL;
const SUPABASE_ANON_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY || window.NEXT_PUBLIC_SUPABASE_ANON_KEY;
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// === JOGO ===
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { id: "player1", x: 100, y: 100 };

// Carregar posição do Supabase
async function load() {
  const { data, error } = await supabase
    .from("players")
    .select("*")
    .eq("id", player.id)
    .single();
  if (data) player = data;
  if (error) console.log("Load error:", error.message);
}

// Salvar posição no Supabase
async function save() {
  const { error } = await supabase
    .from("players")
    .upsert(player);
  if (error) console.log("Save error:", error.message);
}

// Teclas WASD
document.addEventListener("keydown", (e) => {
  if (e.key === "w") player.y -= 5;
  if (e.key === "s") player.y += 5;
  if (e.key === "a") player.x -= 5;
  if (e.key === "d") player.x += 5;
  save();
});

// Desenhar jogador
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "blue";
  ctx.fillRect(player.x, player.y, 20, 20);
  requestAnimationFrame(draw);
}

// Inicializar
load();
draw();
</script>
</body>
</html>
